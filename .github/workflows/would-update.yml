name: would-update
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      quarter_override:
        description: 'Override quarter (e.g. 2026Q3) for testing'
        type: string
        required: false

jobs:
  timing:
    uses: toiflow/-toiflow/.github/workflows/must-update-timing.yml@main
    secrets: inherit
    with:
      quarter_override: ${{ inputs.quarter_override }}
      categories: ANALYSIS,BUG,INSTRUCTION,MIGRATE,PRICE,RECOVERY,USAGE

  update:
    needs: timing
    runs-on: [self-hosted, mac-mini]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOIFOOD_CROSS_REPO_TOKEN }}
      - uses: actions/checkout@v4
        with:
          repository: toifood/-toifood
          token: ${{ secrets.TOIFOOD_CROSS_REPO_TOKEN }}
          path: _toifood
      - name: Install skill
        run: |
          mkdir -p ~/.claude/commands
          cp _toifood/.claude/commands/would-update.md ~/.claude/commands/
      - name: Run would-update skill
        env:
          GH_TOKEN: ${{ secrets.TOIFOOD_CROSS_REPO_TOKEN }}
        run: claude --dangerously-skip-permissions --print "/would-update ts-back"
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Update CSV log
        run: |
          node would-update-csv.js
          git config user.name "would-update"
          git config user.email "admin@toigroup.co.nz"
          git add would/skill-metric-v1.csv
          git diff --cached --quiet || git commit -m "would-update: log $(date '+%Y-%m-%d')" && git push
